{% extends 'base.html' %}
{% block title %}{{ action }} User — StoreDB{% endblock %}

{% block content %}
<div class="page-header">
  <a href="{{ url_for('users') }}" class="btn btn-back mb-2"><i class="bi bi-arrow-left me-1"></i>Back</a>
  <h1 class="page-title"><i class="bi bi-person-fill me-2"></i>{{ action }} User</h1>
</div>

<div class="form-card">
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control custom-input"
             value="{{ user.name if user else '' }}" placeholder="e.g. Alice Johnson" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-control custom-input"
             value="{{ user.email if user else '' }}" placeholder="alice@example.com" required/>
    </div>
    <div class="mb-4">
      <label class="form-label">Tier</label>
      <select name="tier" class="form-select custom-input">
        <option value="standard" {% if not user or user.tier=='standard' %}selected{% endif %}>Standard</option>
        <option value="premium"  {% if user and user.tier=='premium' %}selected{% endif %}>Premium</option>
      </select>
    </div>
    <button type="submit" class="btn btn-action btn-action-primary">
      <i class="bi bi-check-lg me-1"></i>{{ action }} User
    </button>
  </form>
</div>
{% endblock %}
