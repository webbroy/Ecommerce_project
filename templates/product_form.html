{% extends 'base.html' %}
{% block title %}{{ action }} Product — StoreDB{% endblock %}

{% block content %}
<div class="page-header">
  <a href="{{ url_for('products') }}" class="btn btn-back mb-2"><i class="bi bi-arrow-left me-1"></i>Back</a>
  <h1 class="page-title"><i class="bi bi-box-seam-fill me-2"></i>{{ action }} Product</h1>
</div>

<div class="form-card">
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Product Name</label>
      <input type="text" name="name" class="form-control custom-input"
             value="{{ product.name if product else '' }}" placeholder="e.g. Wireless Headphones" required/>
    </div>
    <div class="row mb-3">
      <div class="col-6">
        <label class="form-label">Price ($)</label>
        <input type="number" step="0.01" min="0.01" name="price" class="form-control custom-input"
               value="{{ product.price if product else '' }}" placeholder="0.00" required/>
      </div>
      <div class="col-6">
        <label class="form-label">Stock Quantity</label>
        <input type="number" min="0" name="stock" class="form-control custom-input"
               value="{{ product.stock if product else '' }}" placeholder="0" required/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Category</label>
      <select name="category_id" class="form-select custom-input" required>
        <option value="">— Select category —</option>
        {% for cat in categories %}
        <option value="{{ cat.category_id }}"
          {% if product and product.category_id == cat.category_id %}selected{% endif %}>
          {{ cat.name }}
        </option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-action btn-action-primary">
      <i class="bi bi-check-lg me-1"></i>{{ action }} Product
    </button>
  </form>
</div>
{% endblock %}
