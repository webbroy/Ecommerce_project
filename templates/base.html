<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}StoreDB{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg" id="mainNav">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="{{ url_for('dashboard') }}">
      <span class="brand-icon"><i class="bi bi-database-fill-gear"></i></span>
      Store<span class="brand-accent">DB</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'user' in request.endpoint %}active{% endif %}" href="{{ url_for('users') }}">
            <i class="bi bi-people-fill me-1"></i>Users
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'product' in request.endpoint %}active{% endif %}" href="{{ url_for('products') }}">
            <i class="bi bi-box-seam-fill me-1"></i>Products
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'order' in request.endpoint %}active{% endif %}" href="{{ url_for('orders') }}">
            <i class="bi bi-cart-fill me-1"></i>Orders
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="main-content">
  <div class="container-fluid px-4 py-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show custom-alert" role="alert">
            <i class="bi bi-{% if category == 'success' %}check-circle-fill{% elif category == 'danger' %}exclamation-triangle-fill{% else %}info-circle-fill{% endif %} me-2"></i>
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</main>

<footer class="site-footer">
  <div class="container-fluid px-4">
    <span>CS665 Project 3 &mdash; StoreDB &copy; 2025</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
